<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Story Graph</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0b0c;
      --panel: #151516;
      --ink: #ebebee;
      --muted: #a1a1a8;
      --line: #3b3b40;
      --accent: #c8c8cc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 20% 10%, #1b1b1e 0%, var(--bg) 48%);
      height: 100vh;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 12px;
      padding: 12px;
      overflow: hidden;
    }
    aside, main {
      background: color-mix(in srgb, var(--panel) 92%, black);
      border: 1px solid color-mix(in srgb, var(--line) 55%, black);
      border-radius: 12px;
      min-height: 0;
    }
    aside {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    h1 { margin: 0; font-size: 1.05rem; }
    .muted { color: var(--muted); font-size: 0.88rem; margin-top: 4px; }
    label { display: grid; gap: 6px; font-size: 0.85rem; color: var(--muted); }
    label.tight { gap: 1px; }
    .hidden { display: none !important; }
    input, select {
      width: 100%;
      border: 1px solid #3e3e44;
      border-radius: 8px;
      background: #101012;
      color: var(--ink);
      padding: 8px 10px;
      outline: none;
    }
    input[type="range"] {
      margin: 0;
      padding: 0;
      height: 22px;
    }
    .category-tools {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .category-actions {
      display: flex;
      gap: 6px;
    }
    .tiny-btn {
      border: 1px solid #43434a;
      border-radius: 7px;
      background: #1a1a1d;
      color: var(--ink);
      padding: 4px 8px;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .tiny-btn:hover {
      background: #242428;
    }
    #category-list {
      max-height: 160px;
      overflow: auto;
      border: 1px solid #3b3b41;
      border-radius: 8px;
      background: #131316;
      padding: 6px;
      display: grid;
      gap: 4px;
    }
    .cat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #d8e0ff;
      font-size: 0.82rem;
      justify-content: space-between;
    }
    .cat-item-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cat-item input[type="checkbox"] {
      width: auto;
      padding: 0;
      margin: 0;
      accent-color: #86a8ff;
    }
    .cat-color-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.45);
      flex: 0 0 auto;
    }
    #selected {
      border: 1px solid #3b3b41;
      border-radius: 10px;
      padding: 10px;
      font-size: 0.86rem;
      background: #131316;
      overflow: auto;
      flex: 1;
      min-height: 140px;
    }
    #artwork-preview {
      border: 1px solid #3b3b41;
      border-radius: 10px;
      background: #131316;
      overflow: hidden;
      display: none;
    }
    #artwork-preview.visible { display: block; }
    #artwork-preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-bottom: 1px solid #333339;
      color: #e2e2e7;
      font-size: 0.8rem;
    }
    #artwork-preview-close {
      border: 1px solid #4a4a52;
      background: #222227;
      color: #fff;
      border-radius: 6px;
      width: 22px;
      height: 22px;
      line-height: 18px;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0;
    }
    #artwork-preview-media {
      width: 100%;
      max-height: 190px;
      object-fit: contain;
      display: block;
      background: #0f0f11;
    }
    .k { color: var(--muted); display: block; font-size: 0.75rem; }
    .v { display: block; margin-bottom: 8px; }
    #stats { color: var(--muted); font-size: 0.8rem; }
    main { position: relative; overflow: hidden; }
    #mix-card {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      z-index: 8;
      border: 1px solid #3b3b41;
      background: rgba(16, 16, 18, 0.9);
      border-radius: 10px;
      padding: 8px 10px;
      backdrop-filter: blur(4px);
    }
    #mix-title {
      font-size: 0.76rem;
      color: #d5d5db;
      margin-bottom: 6px;
    }
    #mix-track {
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: #17171a;
      border: 1px solid #3a3a40;
      display: flex;
    }
    .mix-segment {
      height: 100%;
      min-width: 1px;
    }
    #mix-legend {
      margin-top: 7px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .mix-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: #dfdfe4;
      white-space: nowrap;
    }
    .mix-item.zero {
      color: #f2a7a7;
      opacity: 0.72;
    }
    .mix-item.zero .mix-dot {
      border-color: rgba(242, 167, 167, 0.7);
      opacity: 0.75;
    }
    .mix-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.42);
      flex: 0 0 auto;
    }
    #graph { width: 100%; height: 100%; display: block; }
    #graph.panning { cursor: grabbing; }
    #graph.pan-ready { cursor: grab; }
    .node { cursor: pointer; stroke: #0a102b; stroke-width: 1.25px; }
    .node.dim { opacity: 0.08; }
    .node.selected { stroke: #f2f5ff; stroke-width: 2.2px; opacity: 1; }
    .node.connected { opacity: 0.95; }
    .edge { stroke: #425393; stroke-opacity: 0.65; stroke-width: 1.1; }
    .edge.dim { opacity: 0.05; }
    .edge.connected { stroke: #8fa9ff; stroke-opacity: 0.9; stroke-width: 1.45; }
    .label {
      font-size: 10px;
      fill: #dbe4ff;
      pointer-events: auto;
      cursor: pointer;
      text-shadow: 0 0 4px #000;
    }
    .label.dim { opacity: 0.06; }
    .label.selected { opacity: 1; fill: #ffffff; }
    .label.connected { opacity: 0.95; }
    .sub-label {
      font-size: 8px;
      fill: #9da7cc;
      pointer-events: auto;
      cursor: pointer;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .sub-label.dim { opacity: 0.08; }
    .sub-label.selected { opacity: 1; fill: #cfd8ff; }
    .sub-label.connected { opacity: 0.9; }
    .mode-row { display: flex; gap: 8px; align-items: end; }
    .mode-row label { flex: 1 1 auto; }
    #viz-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
    }
    #hierarchy {
      position: absolute;
      inset: 0;
      overflow: auto;
      padding: 120px 12px 14px;
      display: none;
      background: color-mix(in srgb, #0f1118 90%, black);
      border-top: 1px solid color-mix(in srgb, var(--line) 55%, black);
    }
    #hierarchy.visible { display: block; }
    .hier-root { list-style: none; margin: 0; padding: 0; }
    .hier-node { margin: 2px 0; }
    .hier-row {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 22px;
      padding: 2px 6px;
      border-radius: 7px;
      cursor: pointer;
      user-select: none;
      color: #d8ddf5;
    }
    .hier-row:hover { background: rgba(143, 169, 255, 0.12); }
    .hier-row.selected {
      background: rgba(143, 169, 255, 0.24);
      outline: 1px solid rgba(184, 203, 255, 0.55);
    }
    .hier-toggle {
      width: 16px;
      height: 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.06);
      color: #d7defc;
      line-height: 14px;
      font-size: 11px;
      text-align: center;
      padding: 0;
      cursor: pointer;
      flex: 0 0 auto;
    }
    .hier-toggle.spacer {
      border-color: transparent;
      background: transparent;
      cursor: default;
    }
    .hier-dot {
      width: 8px;
      height: 8px;
      border-radius: 99px;
      flex: 0 0 auto;
      border: 1px solid rgba(255, 255, 255, 0.28);
    }
    .hier-label { font-size: 0.9rem; }
    .hier-meta {
      margin-left: auto;
      font-size: 0.68rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: #9aa6d3;
    }
    .hier-children {
      list-style: none;
      margin: 0;
      padding: 0 0 0 16px;
      border-left: 1px dashed rgba(120, 138, 198, 0.3);
    }
  </style>

    const mixLegendEl = document.getElementById('mix-legend');
    const modeSelect = document.getElementById('view-mode');
    const hierarchyEl = document.getElementById('hierarchy');
    const artworkPreviewEl = document.getElementById('artwork-preview');
    const artworkPreviewTitleEl = document.getElementById('artwork-preview-title');
    const artworkPreviewMediaEl = document.getElementById('artwork-preview-media');
    const artworkPreviewCloseEl = document.getElementById('artwork-preview-close');

    // Canonical Story Architect categories + defaults.
    const canonicalColors = {
      world: '#6ea8ff',
      region: '#f48fb1',
      rule: '#8dd3c7',
      culture: '#80cbc4',
      inhabitant: '#ffd180',
      artifact: '#ce93d8',
      symbol: '#ffcc80',
      myth: '#b0bec5',
      story: '#90caf9',
      artwork: '#ffab91',
      phenomenon: '#a5d6a7',
      unknown: '#90a4ae',
    };

    function fallbackColorForCategory(category) {
      // Deterministic HSL so unknown/new categories always get a stable color.
      let hash = 0;
      for (let i = 0; i < category.length; i += 1) {
        hash = (hash * 31 + category.charCodeAt(i)) | 0;
      }
      const hue = Math.abs(hash) % 360;
      return `hsl(${hue} 70% 70%)`;
    }

    function colorForCategory(category) {
      return canonicalColors[category] || fallbackColorForCategory(category || 'unknown');
    }

    const categories = [...new Set(graph.nodes.map(n => n.category))].sort();
    const selectedCategories = new Set(categories);
    for (const c of categories) {
      const row = document.createElement('label');
      row.className = 'cat-item';
      const left = document.createElement('span');
      left.className = 'cat-item-left';
      const box = document.createElement('input');
      box.type = 'checkbox';
      box.value = c;
      box.checked = true;
      box.addEventListener('change', () => {
        if (box.checked) selectedCategories.add(c);
        else selectedCategories.delete(c);
        applyFilters();
      });
      const text = document.createElement('span');
      text.textContent = c;
      const dot = document.createElement('span');
      dot.className = 'cat-color-dot';
      dot.style.background = colorForCategory(c);
      left.append(box, text);
      row.append(left, dot);
      categoryList.appendChild(row);
    }

    const width = 2200;
    const height = 1600;
    const radiusByCategory = (c) => (c === 'world' ? 9 : c === 'region' ? 7.5 : 6);
    const nodeById = new Map(graph.nodes.map(n => [n.id, n]));
    const graphRoot = document.createElementNS('http://www.w3.org/2000/svg', 'g');

    const startRadius = Math.max(500, Math.min(820, graph.nodes.length * 5.1));
    graph.nodes.forEach((n, i) => {
      const angle = (i / graph.nodes.length) * Math.PI * 2;
      n.x = width / 2 + Math.cos(angle) * startRadius + (Math.random() - 0.5) * 70;
      n.y = height / 2 + Math.sin(angle) * startRadius + (Math.random() - 0.5) * 70;
      n.vx = 0;
      n.vy = 0;
      n.r = radiusByCategory(n.category);
      n.color = colorForCategory(n.category);
    });

    const edgeGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    const nodeGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    const labelGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    graphRoot.append(edgeGroup, nodeGroup, labelGroup);
    svg.append(graphRoot);

    const edgeEls = [];
    for (const e of graph.edges) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('class', 'edge');
      edgeGroup.appendChild(line);
      edgeEls.push([e, line]);
    }

    const nodeEls = [];
    const labelEls = [];
    const subLabelEls = [];
    for (const n of graph.nodes) {
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('class', 'node');
      circle.setAttribute('r', String(n.r));
      circle.setAttribute('fill', n.color);
      circle.setAttribute('data-node-id', n.id);
      nodeGroup.appendChild(circle);
      nodeEls.push([n, circle]);

      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('class', 'label');
      text.textContent = n.label;
      text.setAttribute('data-node-id', n.id);
      labelGroup.appendChild(text);
      labelEls.push([n, text]);

      const sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      sub.setAttribute('class', 'sub-label');
      sub.textContent = n.category;
      sub.setAttribute('data-node-id', n.id);
      labelGroup.appendChild(sub);
      subLabelEls.push([n, sub]);
    }

    let selectedNodeId = null;
    let dragPan = null;
    let isSpacePressed = false;
    let suppressBackgroundClickOnce = false;
    let hiddenArtworkForNodeId = null;
    let filterText = '';
    let spacingStrength = Number(spacingInput.value);
    let scale = 1;
    let offsetX = 0;
    let offsetY = 0;
    const MIN_SCALE = 0.34;
    const MAX_SCALE = 2.8;
    let simulationEnergy = 1.0;
    const MIN_SIM_ENERGY = 0.012;
    let settledFrames = 0;
    const SETTLE_FRAMES_REQUIRED = 20;
    let currentMode = modeSelect.value || 'graph';
    const hierarchyRootId = '__root__';
    const parentByNodeId = new Map();
    const childrenByNodeId = new Map();
    const collapsedHierarchyIds = new Set();
    const nodeSlugById = new Map();
    const nodeIdByLabel = new Map();
    const nodeIdBySlug = new Map();

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function slugifyJs(text) {
      return (text || '')
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '');
    }

    for (const n of graph.nodes) {
      const slug = (n.id && n.id.includes(':')) ? n.id.split(':', 2)[1] : slugifyJs(n.label);
      nodeSlugById.set(n.id, slug);
      nodeIdByLabel.set((n.label || '').toLowerCase().trim(), n.id);
      if (slug) nodeIdBySlug.set(slug, n.id);
    }

    function resolveRefToNodeId(ref) {
      const raw = (ref || '').trim();
      if (!raw) return null;
      const byLabel = nodeIdByLabel.get(raw.toLowerCase());
      if (byLabel) return byLabel;
      return nodeIdBySlug.get(slugifyJs(raw)) || null;
    }

    function pushChild(parentId, childId) {
      if (!childrenByNodeId.has(parentId)) childrenByNodeId.set(parentId, []);
      childrenByNodeId.get(parentId).push(childId);
    }

    function buildHierarchyMap() {
      const worldIds = graph.nodes.filter((n) => n.category === 'world').map((n) => n.id);
      for (const n of graph.nodes) {
        let parentId = null;
        if (n.category === 'world') {
          parentId = hierarchyRootId;
        } else {
          const fromParentRegion = resolveRefToNodeId(n.parent_region);
          const fromRegion = resolveRefToNodeId(n.region);
          if (fromParentRegion && fromParentRegion !== n.id) parentId = fromParentRegion;
          else if (fromRegion && fromRegion !== n.id) parentId = fromRegion;
          else if (n.category === 'region' && worldIds.length) parentId = worldIds[0];
          else if (worldIds.length) parentId = worldIds[0];
          else parentId = hierarchyRootId;
        }
        parentByNodeId.set(n.id, parentId);
        pushChild(parentId, n.id);
      }

      for (const [parentId, children] of childrenByNodeId.entries()) {
        children.sort((a, b) => {
          const na = nodeById.get(a);
          const nb = nodeById.get(b);
          if (!na || !nb) return a.localeCompare(b);
          if (na.category !== nb.category) return na.category.localeCompare(nb.category);
          return na.label.localeCompare(nb.label);
        });
      }

      for (const [parentId, children] of childrenByNodeId.entries()) {
        if (parentId !== hierarchyRootId && children.length > 0) {
          collapsedHierarchyIds.add(parentId);
        }
      }
      for (const worldId of worldIds) {
        collapsedHierarchyIds.delete(worldId);
      }
    }

    function ancestorsFor(id) {
      const acc = new Set();
      let current = id;
      while (current && current !== hierarchyRootId) {
        const parent = parentByNodeId.get(current);
        if (!parent || parent === hierarchyRootId) break;
        acc.add(parent);
        current = parent;
      }
      return acc;
    }

    function renderHierarchy(visibleNodeIds) {
      const includeIds = new Set();
      for (const id of visibleNodeIds) {
        includeIds.add(id);
        for (const anc of ancestorsFor(id)) includeIds.add(anc);
      }

      hierarchyEl.innerHTML = '';
      const rootList = document.createElement('ul');
      rootList.className = 'hier-root';
      hierarchyEl.appendChild(rootList);

      function renderNode(nodeId, parentList) {
        if (nodeId !== hierarchyRootId && !includeIds.has(nodeId)) return;
        const node = nodeById.get(nodeId);
        const children = (childrenByNodeId.get(nodeId) || []).filter((childId) => includeIds.has(childId));
        const hasChildren = children.length > 0;

        const li = document.createElement('li');
        li.className = 'hier-node';
        parentList.appendChild(li);

        const row = document.createElement('div');
        row.className = 'hier-row';
        if (selectedNodeId && nodeId === selectedNodeId) row.classList.add('selected');
        li.appendChild(row);

        const toggle = document.createElement('button');
        toggle.type = 'button';
        if (hasChildren) {
          toggle.className = 'hier-toggle';
          toggle.textContent = collapsedHierarchyIds.has(nodeId) ? '+' : '-';
          toggle.addEventListener('click', (evt) => {
            evt.stopPropagation();
            if (collapsedHierarchyIds.has(nodeId)) collapsedHierarchyIds.delete(nodeId);
            else collapsedHierarchyIds.add(nodeId);
            renderHierarchy(visibleNodeIds);
          });
        } else {
          toggle.className = 'hier-toggle spacer';
          toggle.textContent = '';
          toggle.disabled = true;
        }
        row.appendChild(toggle);

        if (node) {
          const dot = document.createElement('span');
          dot.className = 'hier-dot';
          dot.style.background = colorForCategory(node.category);
          row.appendChild(dot);

          const label = document.createElement('span');
          label.className = 'hier-label';
          label.textContent = node.label;
          row.appendChild(label);

          const meta = document.createElement('span');
          meta.className = 'hier-meta';
          meta.textContent = node.category;
          row.appendChild(meta);

          row.addEventListener('click', () => {
            hiddenArtworkForNodeId = null;
            setSelected(node.id);
          });
        } else {
          const label = document.createElement('span');
          label.className = 'hier-label';
          label.textContent = 'Universe';
          row.appendChild(label);
        }

        if (hasChildren && !collapsedHierarchyIds.has(nodeId)) {
          const nested = document.createElement('ul');
          nested.className = 'hier-children';
          li.appendChild(nested);
          for (const childId of children) {
            renderNode(childId, nested);
          }
        }
      }

      for (const childId of childrenByNodeId.get(hierarchyRootId) || []) {
        renderNode(childId, rootList);
      }
    }

    function setViewMode(mode) {
      currentMode = mode === 'hierarchy' ? 'hierarchy' : 'graph';
      const showHierarchy = currentMode === 'hierarchy';
      svg.style.display = showHierarchy ? 'none' : 'block';
      hierarchyEl.classList.toggle('visible', showHierarchy);
      spacingControlEl.classList.toggle('hidden', showHierarchy);
      applyFilters();
    }

    function neighbors(id) {
      const ids = new Set([id]);
      for (const e of graph.edges) {
        if (e.source === id) ids.add(e.target);
        if (e.target === id) ids.add(e.source);
      }
      return ids;
    }

    function setSelected(id) {
      selectedNodeId = id;
      // Keep selection static; do not animate after click.
      simulationEnergy = MIN_SIM_ENERGY;
      settleTicksRemaining = 0;
      for (const node of graph.nodes) {
        node.vx = 0;
        node.vy = 0;
      }
      const n = nodeById.get(id);
      if (hiddenArtworkForNodeId !== id) {
        renderArtworkPreview(n);
      }
      const themeText = n.themes.length ? n.themes.join(', ') : 'none';
      selectedEl.innerHTML = `
        <span class="k">Name</span><span class="v">${n.label}</span>
        <span class="k">Category</span><span class="v">${n.category}</span>
        <span class="k">Status</span><span class="v">${n.status}</span>
        <span class="k">Themes</span><span class="v">${themeText}</span>
        <span class="k">File</span><span class="v"><code>${n.path}</code></span>
      `;
      applyFilters();
    }

    function clearSelection() {
      selectedNodeId = null;
      selectedEl.innerHTML = 'Click a node to inspect details.';
      hideArtworkPreview();
      applyFilters();
    }

    function assetUrlFromPath(assetPath) {
      if (!assetPath) return '';
      return `../${assetPath}`;
    }

    function hideArtworkPreview() {
      artworkPreviewEl.classList.remove('visible');
      artworkPreviewMediaEl.removeAttribute('src');
    }

    function renderArtworkPreview(node) {
      if (!node || node.category !== 'artwork' || !node.asset_path) {
        hideArtworkPreview();
        return;
      }
      artworkPreviewTitleEl.textContent = node.label;
      artworkPreviewMediaEl.src = assetUrlFromPath(node.asset_path);
      artworkPreviewEl.classList.add('visible');
    }

    function matchNode(n) {
      if (!selectedCategories.has(n.category)) return false;
      if (!filterText) return true;
      const hay = `${n.label} ${n.category} ${n.path} ${n.themes.join(' ')}`.toLowerCase();
      return hay.includes(filterText);
    }

    function applyFilters() {
      const visibleNodeIds = new Set(graph.nodes.filter(matchNode).map(n => n.id));
      const neighborIds = selectedNodeId ? neighbors(selectedNodeId) : null;

      for (const [n, el] of nodeEls) {
        const isVisible = visibleNodeIds.has(n.id);
        const shouldDim = !isVisible || (neighborIds && !neighborIds.has(n.id));
        const isSelected = selectedNodeId === n.id;
        const isConnected = !!(neighborIds && !isSelected && neighborIds.has(n.id));
        el.classList.toggle('dim', shouldDim);
        el.classList.toggle('selected', isSelected && isVisible);
        el.classList.toggle('connected', isConnected && isVisible);
        el.style.display = isVisible ? 'block' : 'none';
      }

      for (const [n, el] of labelEls) {
        const isVisible = visibleNodeIds.has(n.id);
        const shouldDim = !isVisible || (neighborIds && !neighborIds.has(n.id));
        const isSelected = selectedNodeId === n.id;
        const isConnected = !!(neighborIds && !isSelected && neighborIds.has(n.id));
        el.classList.toggle('dim', shouldDim);
        el.classList.toggle('selected', isSelected && isVisible);
        el.classList.toggle('connected', isConnected && isVisible);
        el.style.display = isVisible ? 'block' : 'none';
      }
      for (const [n, el] of subLabelEls) {
        const isVisible = visibleNodeIds.has(n.id);
        const shouldDim = !isVisible || (neighborIds && !neighborIds.has(n.id));
        const isSelected = selectedNodeId === n.id;
        const isConnected = !!(neighborIds && !isSelected && neighborIds.has(n.id));
        el.classList.toggle('dim', shouldDim);
        el.classList.toggle('selected', isSelected && isVisible);
        el.classList.toggle('connected', isConnected && isVisible);
        el.style.display = isVisible ? 'block' : 'none';
      }

      let visibleEdges = 0;
      for (const [e, el] of edgeEls) {
        const sourceVisible = visibleNodeIds.has(e.source);
        const targetVisible = visibleNodeIds.has(e.target);
        const visible = sourceVisible && targetVisible;
        if (visible) visibleEdges += 1;
        const isConnected = !!(selectedNodeId && visible && (e.source === selectedNodeId || e.target === selectedNodeId));
        const shouldDim = !visible || (selectedNodeId && !isConnected);
        el.classList.toggle('dim', shouldDim);
        el.classList.toggle('connected', isConnected);
        el.style.display = visible ? 'block' : 'none';
      }
      if (currentMode === 'hierarchy') {
        renderHierarchy(visibleNodeIds);
      }
      const modeText = currentMode === 'hierarchy' ? 'hierarchy' : 'graph';
      statsEl.textContent = `${visibleNodeIds.size} visible nodes, ${visibleEdges} visible links (${modeText} mode)`;
      renderConnectionMix(visibleNodeIds, neighborIds);
    }

    function collectMixFromVisible(visibleNodeIds) {
      const counts = new Map();
      for (const id of visibleNodeIds) {
        const n = nodeById.get(id);
        if (!n) continue;
        const key = n.category || 'unknown';
        counts.set(key, (counts.get(key) || 0) + 1);
      }
      return counts;
    }

    function collectMixFromNode(nodeId) {
      const counts = new Map();
      if (!nodeId) return counts;
      const origin = nodeById.get(nodeId);
      if (origin) {
        counts.set(origin.category || 'unknown', 1);
      }
      for (const e of graph.edges) {
        let neighborId = null;
        if (e.source === nodeId) neighborId = e.target;
        if (e.target === nodeId) neighborId = e.source;
        if (!neighborId) continue;
        const n = nodeById.get(neighborId);
        if (!n) continue;
        const key = n.category || 'unknown';
        counts.set(key, (counts.get(key) || 0) + 1);
      }
      return counts;
    }

    function sortMixEntries(counts) {
      const allCategories = new Set([...categories, ...counts.keys()]);
      const fullEntries = [...allCategories].map((category) => [category, counts.get(category) || 0]);
      return fullEntries.sort((a, b) => {
        if (b[1] !== a[1]) return b[1] - a[1];
        return a[0].localeCompare(b[0]);
      });
    }

    function renderConnectionMix(visibleNodeIds, neighborIds) {
      const counts = selectedNodeId
        ? collectMixFromNode(selectedNodeId)
        : collectMixFromVisible(visibleNodeIds);
      const entries = sortMixEntries(counts);
      const total = entries.reduce((acc, [, count]) => acc + count, 0);

      mixTrackEl.innerHTML = '';
      mixLegendEl.innerHTML = '';

      if (total <= 0) {
        mixTitleEl.textContent = selectedNodeId ? 'Connection mix (selected)' : 'Connection mix (visible graph)';
        const empty = document.createElement('span');
        empty.className = 'mix-item';
        empty.textContent = 'No data';
        mixLegendEl.appendChild(empty);
        return;
      }

      mixTitleEl.textContent = selectedNodeId
        ? 'Connection mix (selected node + direct links)'
        : 'Connection mix (visible graph)';

      for (const [category, count] of entries) {
        const pct = (count / total) * 100;

        if (count > 0) {
          const seg = document.createElement('span');
          seg.className = 'mix-segment';
          seg.style.width = `${pct}%`;
          seg.style.background = colorForCategory(category);
          mixTrackEl.appendChild(seg);
        }

        const item = document.createElement('span');
        item.className = 'mix-item';
        const dot = document.createElement('span');
        dot.className = 'mix-dot';
        dot.style.background = colorForCategory(category);
        const text = document.createElement('span');
        text.textContent = `${category} ${count > 0 ? Math.round(pct) : 0}%`;
        item.append(dot, text);
        if (count === 0) item.classList.add('zero');
        mixLegendEl.appendChild(item);
      }
    }

    function applyTransform() {
      graphRoot.setAttribute('transform', `translate(${offsetX} ${offsetY}) scale(${scale})`);
    }

    function toWorld(screenX, screenY) {
      return {
        x: (screenX - offsetX) / scale,
        y: (screenY - offsetY) / scale,
      };
    }

    function zoomAt(factor, sx, sy) {
      const nextScale = clamp(scale * factor, MIN_SCALE, MAX_SCALE);
      if (nextScale === scale) return;
      const wx = (sx - offsetX) / scale;
      const wy = (sy - offsetY) / scale;
      scale = nextScale;
      offsetX = sx - wx * scale;
      offsetY = sy - wy * scale;
      applyTransform();
    }

    function tick() {
      if (simulationEnergy <= MIN_SIM_ENERGY) return;
      let totalMotion = 0;

      for (const e of graph.edges) {
        const a = nodeById.get(e.source);
        const b = nodeById.get(e.target);
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.max(1, Math.hypot(dx, dy));
        const ideal = spacingStrength;
        const force = (dist - ideal) * (0.0028 * simulationEnergy);
        const fx = (dx / dist) * force;
        const fy = (dy / dist) * force;
        a.vx += fx; a.vy += fy;
        b.vx -= fx; b.vy -= fy;
      }

      for (let i = 0; i < graph.nodes.length; i++) {
        for (let j = i + 1; j < graph.nodes.length; j++) {
          const a = graph.nodes[i];
          const b = graph.nodes[j];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.max(1, Math.hypot(dx, dy));
          const minDist = a.r + b.r + (spacingStrength * 0.5);
          if (dist < minDist) {
            const push = (minDist - dist) * (0.06 * simulationEnergy);
            const px = (dx / dist) * push;
            const py = (dy / dist) * push;
            a.vx -= px; a.vy -= py;
            b.vx += px; b.vy += py;
          }
        }
      }

      for (const n of graph.nodes) {
        const dx = width / 2 - n.x;
        const dy = height / 2 - n.y;
        n.vx += dx * (0.00013 * simulationEnergy);
        n.vy += dy * (0.00013 * simulationEnergy);
        n.vx *= 0.82;
        n.vy *= 0.82;
        if (Math.abs(n.vx) < 0.003) n.vx = 0;
        if (Math.abs(n.vy) < 0.003) n.vy = 0;
        n.x += n.vx;
        n.y += n.vy;
        n.x = clamp(n.x, n.r + 16, width - n.r - 16);
        n.y = clamp(n.y, n.r + 16, height - n.r - 16);
        totalMotion += Math.abs(n.vx) + Math.abs(n.vy);
      }

      // Cool the simulation so nodes settle and stop jiggling.
      simulationEnergy *= 0.992;
      if (simulationEnergy < MIN_SIM_ENERGY) simulationEnergy = MIN_SIM_ENERGY;

      if (totalMotion < graph.nodes.length * 0.01) {
        settledFrames += 1;
      } else {
        settledFrames = 0;
      }

      // Hard-stop micro motion once layout is stable.
      if (settledFrames >= SETTLE_FRAMES_REQUIRED) {
        simulationEnergy = MIN_SIM_ENERGY;
        for (const n of graph.nodes) {
          n.vx = 0;
          n.vy = 0;
        }
      }
    }

    function render() {
      for (const [e, line] of edgeEls) {
        const a = nodeById.get(e.source);
        const b = nodeById.get(e.target);
        line.setAttribute('x1', a.x);
        line.setAttribute('y1', a.y);
        line.setAttribute('x2', b.x);
        line.setAttribute('y2', b.y);
      }
      for (const [n, circle] of nodeEls) {
        circle.setAttribute('cx', n.x);
        circle.setAttribute('cy', n.y);
      }
      for (const [n, text] of labelEls) {
        text.setAttribute('x', n.x + n.r + 2);
        text.setAttribute('y', n.y + 3);
      }
      for (const [n, text] of subLabelEls) {
        text.setAttribute('x', n.x + n.r + 2);
        text.setAttribute('y', n.y + 12);
      }
    }

    function frame() {
      tick();
      render();
      requestAnimationFrame(frame);
    }

    function pickNodeFromPoint(x, y) {
      for (const n of graph.nodes) {
        const dx = n.x - x;
        const dy = n.y - y;
        if (Math.hypot(dx, dy) <= n.r + 9) return n;
      }
      return null;
    }

    const toLocal = (evt) => {
      const rect = svg.getBoundingClientRect();
      const sx = width / rect.width;
      const sy = height / rect.height;
      const screenX = (evt.clientX - rect.left) * sx;
      const screenY = (evt.clientY - rect.top) * sy;
      return toWorld(screenX, screenY);
    };

    svg.addEventListener('pointerdown', (evt) => {
      const wantsPan = evt.button === 1 || (evt.button === 0 && isSpacePressed);
      if (!wantsPan) return;
      simulationEnergy = 0.45;
      settledFrames = 0;
      settleTicksRemaining = 10;
      const clickedNodeId = evt.target && evt.target.getAttribute ? evt.target.getAttribute('data-node-id') : null;
      if (!clickedNodeId) {
        evt.preventDefault();
        dragPan = { x: evt.clientX, y: evt.clientY };
        svg.classList.add('panning');
        svg.setPointerCapture(evt.pointerId);
      }
    });

    svg.addEventListener('pointermove', (evt) => {
      if (dragPan) {
        const rect = svg.getBoundingClientRect();
        const sx = width / rect.width;
        const sy = height / rect.height;
        offsetX += (evt.clientX - dragPan.x) * sx;
        offsetY += (evt.clientY - dragPan.y) * sy;
        dragPan = { x: evt.clientX, y: evt.clientY };
        suppressBackgroundClickOnce = true;
        applyTransform();
      }
    });

    svg.addEventListener('pointerup', (evt) => {
      dragPan = null;
      svg.classList.remove('panning');
      try { svg.releasePointerCapture(evt.pointerId); } catch (_err) {}
    });

    svg.addEventListener('pointercancel', () => {
      dragPan = null;
      svg.classList.remove('panning');
    });

    svg.addEventListener('wheel', (evt) => {
      evt.preventDefault();
      const rect = svg.getBoundingClientRect();
      const sx = width / rect.width;
      const sy = height / rect.height;
      const cx = (evt.clientX - rect.left) * sx;
      const cy = (evt.clientY - rect.top) * sy;
      const factor = evt.deltaY < 0 ? 1.1 : 0.9;
      zoomAt(factor, cx, cy);
    }, { passive: false });

    function centerView() {
      // Start with the graph centered in the viewport.
      scale = 1.2;
      offsetX = (width * (1 - scale)) / 2;
      offsetY = (height * (1 - scale)) / 2;
      applyTransform();
    }

    spacingInput.addEventListener('input', (evt) => {
      spacingStrength = Number(evt.target.value);
      simulationEnergy = 1.0;
      settledFrames = 0;
    });

    svg.addEventListener('click', (evt) => {
      const clickedNodeId = evt.target && evt.target.getAttribute ? evt.target.getAttribute('data-node-id') : null;
      if (clickedNodeId) {
        hiddenArtworkForNodeId = null;
        setSelected(clickedNodeId);
        return;
      }
      if (suppressBackgroundClickOnce) {
        suppressBackgroundClickOnce = false;
        return;
      }
      clearSelection();
    });

    window.addEventListener('keydown', (evt) => {
      if (evt.code === 'Space') {
        isSpacePressed = true;
        svg.classList.add('pan-ready');
        evt.preventDefault();
      }
    });

    window.addEventListener('keyup', (evt) => {
      if (evt.code === 'Space') {
        isSpacePressed = false;
        svg.classList.remove('pan-ready');
      }
    });

    artworkPreviewCloseEl.addEventListener('click', () => {
      hideArtworkPreview();
      hiddenArtworkForNodeId = selectedNodeId;
    });

    selectAllCategoriesBtn.addEventListener('click', () => {
      selectedCategories.clear();
      for (const c of categories) selectedCategories.add(c);
      for (const box of categoryList.querySelectorAll('input[type="checkbox"]')) {
        box.checked = true;
      }
      applyFilters();
    });

    deselectAllCategoriesBtn.addEventListener('click', () => {
      selectedCategories.clear();
      for (const box of categoryList.querySelectorAll('input[type="checkbox"]')) {
        box.checked = false;
      }
      applyFilters();
    });

    searchInput.addEventListener('input', (evt) => {
      filterText = evt.target.value.trim().toLowerCase();
      applyFilters();
    });

    modeSelect.addEventListener('change', (evt) => {
      setViewMode(evt.target.value);
    });

    buildHierarchyMap();
    centerView();
    setViewMode(currentMode);
    applyFilters();
    frame();
  </script>
</body>
</html>
