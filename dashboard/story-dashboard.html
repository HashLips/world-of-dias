<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Story Graph</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0b0c;
      --panel: #151516;
      --ink: #ebebee;
      --muted: #a1a1a8;
      --line: #3b3b40;
      --accent: #c8c8cc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 20% 10%, #1b1b1e 0%, var(--bg) 48%);
      height: 100vh;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 12px;
      padding: 12px;
      overflow: hidden;
    }
    aside, main {
      background: color-mix(in srgb, var(--panel) 92%, black);
      border: 1px solid color-mix(in srgb, var(--line) 55%, black);
      border-radius: 12px;
      min-height: 0;
    }
    aside {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    h1 { margin: 0; font-size: 1.05rem; }
    .muted { color: var(--muted); font-size: 0.88rem; margin-top: 4px; }
    label { display: grid; gap: 6px; font-size: 0.85rem; color: var(--muted); }
    label.tight { gap: 1px; }
    input, select {
      width: 100%;
      border: 1px solid #3e3e44;
      border-radius: 8px;
      background: #101012;
      color: var(--ink);
      padding: 8px 10px;
      outline: none;
    }
    input[type="range"] {
      margin: 0;
      padding: 0;
      height: 22px;
    }
    .category-tools {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .category-actions {
      display: flex;
      gap: 6px;
    }
    .tiny-btn {
      border: 1px solid #43434a;
      border-radius: 7px;
      background: #1a1a1d;
      color: var(--ink);
      padding: 4px 8px;
      font-size: 0.75rem;
      cursor: pointer;
    }
    .tiny-btn:hover {
      background: #242428;
    }
    #category-list {
      max-height: 160px;
      overflow: auto;
      border: 1px solid #3b3b41;
      border-radius: 8px;
      background: #131316;
      padding: 6px;
      display: grid;
      gap: 4px;
    }
    .cat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #d8e0ff;
      font-size: 0.82rem;
      justify-content: space-between;
    }
    .cat-item-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cat-item input[type="checkbox"] {
      width: auto;
      padding: 0;
      margin: 0;
      accent-color: #86a8ff;
    }
    .cat-color-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.45);
      flex: 0 0 auto;
    }
    #selected {
      border: 1px solid #3b3b41;
      border-radius: 10px;
      padding: 10px;
      font-size: 0.86rem;
      background: #131316;
      overflow: auto;
      flex: 1;
      min-height: 140px;
    }
    #artwork-preview {
      border: 1px solid #3b3b41;
      border-radius: 10px;
      background: #131316;
      overflow: hidden;
      display: none;
    }
    #artwork-preview.visible { display: block; }
    #artwork-preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-bottom: 1px solid #333339;
      color: #e2e2e7;
      font-size: 0.8rem;
    }
    #artwork-preview-close {
      border: 1px solid #4a4a52;
      background: #222227;
      color: #fff;
      border-radius: 6px;
      width: 22px;
      height: 22px;
      line-height: 18px;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 0;
    }
    #artwork-preview-media {
      width: 100%;
      max-height: 190px;
      object-fit: contain;
      display: block;
      background: #0f0f11;
    }
    .k { color: var(--muted); display: block; font-size: 0.75rem; }
    .v { display: block; margin-bottom: 8px; }
    #stats { color: var(--muted); font-size: 0.8rem; }
    main { position: relative; overflow: hidden; }
    #mix-card {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      z-index: 8;
      border: 1px solid #3b3b41;
      background: rgba(16, 16, 18, 0.9);
      border-radius: 10px;
      padding: 8px 10px;
      backdrop-filter: blur(4px);
    }
    #mix-title {
      font-size: 0.76rem;
      color: #d5d5db;
      margin-bottom: 6px;
    }
    #mix-track {
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: #17171a;
      border: 1px solid #3a3a40;
      display: flex;
    }
    .mix-segment {
      height: 100%;
      min-width: 1px;
    }
    #mix-legend {
      margin-top: 7px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .mix-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: #dfdfe4;
      white-space: nowrap;
    }
    .mix-item.zero {
      color: #f2a7a7;
      opacity: 0.72;
    }
    .mix-item.zero .mix-dot {
      border-color: rgba(242, 167, 167, 0.7);
      opacity: 0.75;
    }
    .mix-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.42);
      flex: 0 0 auto;
    }
    #graph { width: 100%; height: 100%; display: block; }
    #graph.panning { cursor: grabbing; }
    #graph.pan-ready { cursor: grab; }
    .node { cursor: pointer; stroke: #0a102b; stroke-width: 1.25px; }
    .node.dim { opacity: 0.08; }
    .node.selected { stroke: #f2f5ff; stroke-width: 2.2px; opacity: 1; }
    .node.connected { opacity: 0.95; }
    .edge { stroke: #425393; stroke-opacity: 0.65; stroke-width: 1.1; }
    .edge.dim { opacity: 0.05; }
    .edge.connected { stroke: #8fa9ff; stroke-opacity: 0.9; stroke-width: 1.45; }
    .label {
      font-size: 10px;
      fill: #dbe4ff;
      pointer-events: auto;
      cursor: pointer;
      text-shadow: 0 0 4px #000;
    }
    .label.dim { opacity: 0.06; }
    .label.selected { opacity: 1; fill: #ffffff; }
    .label.connected { opacity: 0.95; }
    .sub-label {
      font-size: 8px;
      fill: #9da7cc;
      pointer-events: auto;
      cursor: pointer;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .sub-label.dim { opacity: 0.08; }
    .sub-label.selected { opacity: 1; fill: #cfd8ff; }
    .sub-label.connected { opacity: 0.9; }
  </style>
</head>

        counts.set(key, (counts.get(key) || 0) + 1);

    function collectMixFromNode(nodeId) {

      for (const e of graph.edges) {

        if (!neighborId) continue;
        const n = nodeById.get(neighborId);
        if (!n) continue;
        const key = n.category || 'unknown';

            const py = (dy / dist) * push;
            a.vx -= px; a.vy -= py;
            b.vx += px; b.vy += py;
          }
        }
      }

      for (const n of graph.nodes) {
        const dx = width / 2 - n.x;
        const dy = height / 2 - n.y;
        n.vx += dx * (0.00013 * simulationEnergy);
        n.vy += dy * (0.00013 * simulationEnergy);
        n.vx *= 0.82;
        n.vy *= 0.82;
        if (Math.abs(n.vx) < 0.003) n.vx = 0;
        if (Math.abs(n.vy) < 0.003) n.vy = 0;
        n.x += n.vx;
        n.y += n.vy;
        n.x = clamp(n.x, n.r + 16, width - n.r - 16);
        n.y = clamp(n.y, n.r + 16, height - n.r - 16);
        totalMotion += Math.abs(n.vx) + Math.abs(n.vy);
      }

      // Cool the simulation so nodes settle and stop jiggling.
      simulationEnergy *= 0.992;
      if (simulationEnergy < MIN_SIM_ENERGY) simulationEnergy = MIN_SIM_ENERGY;

      if (totalMotion < graph.nodes.length * 0.01) {
        settledFrames += 1;
      } else {
        settledFrames = 0;
      }

      // Hard-stop micro motion once layout is stable.
      if (settledFrames >= SETTLE_FRAMES_REQUIRED) {
        simulationEnergy = MIN_SIM_ENERGY;
        for (const n of graph.nodes) {
          n.vx = 0;
          n.vy = 0;
        }
      }
    }

    function render() {
      for (const [e, line] of edgeEls) {
        const a = nodeById.get(e.source);
        const b = nodeById.get(e.target);
        line.setAttribute('x1', a.x);
        line.setAttribute('y1', a.y);
        line.setAttribute('x2', b.x);
        line.setAttribute('y2', b.y);
      }
      for (const [n, circle] of nodeEls) {
        circle.setAttribute('cx', n.x);
        circle.setAttribute('cy', n.y);
      }
      for (const [n, text] of labelEls) {
        text.setAttribute('x', n.x + n.r + 2);
        text.setAttribute('y', n.y + 3);
      }
      for (const [n, text] of subLabelEls) {
        text.setAttribute('x', n.x + n.r + 2);
        text.setAttribute('y', n.y + 12);
      }
    }

    function frame() {
      tick();
      render();
      requestAnimationFrame(frame);
    }

    function pickNodeFromPoint(x, y) {
      for (const n of graph.nodes) {
        const dx = n.x - x;
        const dy = n.y - y;
        if (Math.hypot(dx, dy) <= n.r + 9) return n;
      }
      return null;
    }

    const toLocal = (evt) => {
      const rect = svg.getBoundingClientRect();
      const sx = width / rect.width;
      const sy = height / rect.height;
      const screenX = (evt.clientX - rect.left) * sx;
      const screenY = (evt.clientY - rect.top) * sy;
      return toWorld(screenX, screenY);
    };

    svg.addEventListener('pointerdown', (evt) => {
      const wantsPan = evt.button === 1 || (evt.button === 0 && isSpacePressed);
      if (!wantsPan) return;
      simulationEnergy = 0.45;
      settledFrames = 0;
      settleTicksRemaining = 10;
      const clickedNodeId = evt.target && evt.target.getAttribute ? evt.target.getAttribute('data-node-id') : null;
      if (!clickedNodeId) {
        evt.preventDefault();
        dragPan = { x: evt.clientX, y: evt.clientY };
        svg.classList.add('panning');
        svg.setPointerCapture(evt.pointerId);
      }
    });

    svg.addEventListener('pointermove', (evt) => {
      if (dragPan) {
        const rect = svg.getBoundingClientRect();
        const sx = width / rect.width;
        const sy = height / rect.height;
        offsetX += (evt.clientX - dragPan.x) * sx;
        offsetY += (evt.clientY - dragPan.y) * sy;
        dragPan = { x: evt.clientX, y: evt.clientY };
        suppressBackgroundClickOnce = true;
        applyTransform();
      }
    });

    svg.addEventListener('pointerup', (evt) => {
      dragPan = null;
      svg.classList.remove('panning');
      try { svg.releasePointerCapture(evt.pointerId); } catch (_err) {}
    });

    svg.addEventListener('pointercancel', () => {
      dragPan = null;
      svg.classList.remove('panning');
    });

    svg.addEventListener('wheel', (evt) => {
      evt.preventDefault();
      const rect = svg.getBoundingClientRect();
      const sx = width / rect.width;
      const sy = height / rect.height;
      const cx = (evt.clientX - rect.left) * sx;
      const cy = (evt.clientY - rect.top) * sy;
      const factor = evt.deltaY < 0 ? 1.1 : 0.9;
      zoomAt(factor, cx, cy);
    }, { passive: false });

    function centerView() {
      // Start with the graph centered in the viewport.
      scale = 1.2;
      offsetX = (width * (1 - scale)) / 2;
      offsetY = (height * (1 - scale)) / 2;
      applyTransform();
    }

    spacingInput.addEventListener('input', (evt) => {
      spacingStrength = Number(evt.target.value);
      simulationEnergy = 1.0;
      settledFrames = 0;
    });

    svg.addEventListener('click', (evt) => {
      const clickedNodeId = evt.target && evt.target.getAttribute ? evt.target.getAttribute('data-node-id') : null;
      if (clickedNodeId) {
        hiddenArtworkForNodeId = null;
        setSelected(clickedNodeId);
        return;
      }
      if (suppressBackgroundClickOnce) {
        suppressBackgroundClickOnce = false;
        return;
      }
      clearSelection();
    });

    window.addEventListener('keydown', (evt) => {
      if (evt.code === 'Space') {
        isSpacePressed = true;
        svg.classList.add('pan-ready');
        evt.preventDefault();
      }
    });

    window.addEventListener('keyup', (evt) => {
      if (evt.code === 'Space') {
        isSpacePressed = false;
        svg.classList.remove('pan-ready');
      }
    });

    artworkPreviewCloseEl.addEventListener('click', () => {
      hideArtworkPreview();
      hiddenArtworkForNodeId = selectedNodeId;
    });

    selectAllCategoriesBtn.addEventListener('click', () => {
      selectedCategories.clear();
      for (const c of categories) selectedCategories.add(c);
      for (const box of categoryList.querySelectorAll('input[type="checkbox"]')) {
        box.checked = true;
      }
      applyFilters();
    });

    deselectAllCategoriesBtn.addEventListener('click', () => {
      selectedCategories.clear();
      for (const box of categoryList.querySelectorAll('input[type="checkbox"]')) {
        box.checked = false;
      }
      applyFilters();
    });

    searchInput.addEventListener('input', (evt) => {
      filterText = evt.target.value.trim().toLowerCase();
      applyFilters();
    });

    centerView();
    applyFilters();
    frame();
  </script>
</body>
</html>
